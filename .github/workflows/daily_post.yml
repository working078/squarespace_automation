name: Daily Blog Poster

# 7:00 Australia/Melbourne (AEST, UTC+10): 21:00 UTC = 07:00 next calendar day in Melbourne.
# During AEDT (UTC+11) the same cron runs at 08:00 Melbourne — adjust to 20:00 UTC if needed.
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      test_row_limit:
        description: 'Max posts this run (use 1 for a smoke test; leave empty for all due rows)'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore auth.json
        run: |
          if [ -n "$AUTH_JSON_BASE64" ]; then
            python3 -c "
import base64, gzip, os
raw = base64.b64decode(os.environ['AUTH_JSON_BASE64'].strip())
if raw[:2] == b'\x1f\x8b':
    raw = gzip.decompress(raw)
open('auth.json', 'wb').write(raw)
print(f'Session restored from AUTH_JSON_BASE64 ({len(raw)} bytes).')
"
          else
            echo "No AUTH_JSON_BASE64 secret — trying cache."
          fi
        env:
          AUTH_JSON_BASE64: ${{ secrets.AUTH_JSON_BASE64 }}

      - name: Restore auth from cache (fallback if secret missing)
        uses: actions/cache/restore@v4
        with:
          path: auth.json
          key: squarespace-auth-session
          restore-keys: squarespace-auth-session

      - name: Verify auth.json exists
        run: |
          if [ ! -f auth.json ]; then
            echo "::error::auth.json missing. Set AUTH_JSON_BASE64 or restore cache from a prior successful run."
            exit 1
          fi
          ls -la auth.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run automation
        env:
          SQ_EMAIL:             ${{ secrets.SQ_EMAIL }}
          SQ_PASSWORD:          ${{ secrets.SQ_PASSWORD }}
          GOOGLE_CREDENTIALS:   ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID:       ${{ secrets.SPREADSHEET_ID }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_AI }}
          HEADLESS:             "true"
          TEST_ROW_LIMIT:       ${{ github.event.inputs.test_row_limit }}
          GITHUB_ACTIONS:       "true"
          # Production only — never set DRY_RUN or test SPREADSHEET_ID/BASE_URL here.
          DRY_RUN:              ""
        run: python automation.py

      - name: Save session to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: auth.json
          key: squarespace-auth-session
