name: Daily Blog Poster

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run automation
        env:
          SQ_EMAIL: ${{ secrets.SQ_EMAIL }}
          SQ_PASSWORD: ${{ secrets.SQ_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          AUTH_JSON_BASE64: ${{ secrets.AUTH_JSON_BASE64 }}
          GITHUB_ACTIONS: "true"
        run: |
          if [ -n "$AUTH_JSON_BASE64" ]; then
            echo "$AUTH_JSON_BASE64" | base64 --decode > auth.json
            echo "Session loaded from secret."
          fi
          SCRIPT_PATH=$(find . -name "automation.py" | head -n 1)
          python "$SCRIPT_PATH"

      - name: Upload Debug Screenshots
        if: always() # CRITICAL: This ensures artifacts are saved even on success
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
          retention-days: 1