name: Daily Blog Poster

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files (Troubleshooting)
        run: ls -R  # This tells us exactly where automation.py is

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright  # Explicitly ensure playwright is there
          playwright install chromium --with-deps

      - name: Run automation
        env:
          SQ_EMAIL: ${{ secrets.SQ_EMAIL }}
          SQ_PASSWORD: ${{ secrets.SQ_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GITHUB_ACTIONS: "true"
        # We use 'find' to run the script no matter which folder it is in
        run: |
          SCRIPT_PATH=$(find . -name "automation.py" | head -n 1)
          echo "Running script found at: $SCRIPT_PATH"
          python "$SCRIPT_PATH"