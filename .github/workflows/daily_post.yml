name: Daily Blog Poster

on:
  schedule:
    - cron: '0 21 * * *' # Runs daily at 21:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Load session state
        run: |
          if [ -n "${{ secrets.AUTH_JSON_BASE64 }}" ]; then
            echo "${{ secrets.AUTH_JSON_BASE64 }}" | base64 -d > auth.json
            echo "Session state loaded."
          else
            echo "No session state found. Proceeding with fresh login."
          fi

      - name: Run automation
        env:
          SQ_EMAIL: ${{ secrets.SQ_EMAIL }}
          SQ_PASSWORD: ${{ secrets.SQ_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GITHUB_ACTIONS: "true"
        run: |
          # Finds and runs automation.py regardless of folder structure
          SCRIPT_PATH=$(find . -name "automation.py" | head -n 1)
          python "$SCRIPT_PATH"

      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "**/*.png"
          retention-days: 1