name: Daily Blog Poster

# TRIGGER ARCHITECTURE (most-reliable to least-reliable):
#
#  1. cron-job.org (PRIMARY — 99.9% reliable external trigger)
#     Sends a repository_dispatch event via GitHub API every day at 21:00 UTC
#     (07:00 Melbourne AEST). Setup: https://cron-job.org → see README.
#
#  2. GitHub cron schedule (FALLBACK — best-effort, can be delayed/skipped)
#     Fires at 21:00 UTC and 23:00 UTC as a safety net if cron-job.org misses.
#     During AEDT (Oct–Apr, UTC+11): change to '0 20 * * *' and '0 22 * * *'.
#
#  3. workflow_dispatch (MANUAL — for recovery runs)
#
# The concurrency group prevents double-posting across all trigger types.
# If today's row is already 'Posted' any subsequent trigger exits cleanly.
on:
  repository_dispatch:
    types: [daily-blog-post]   # Fired by cron-job.org via GitHub API
  schedule:
    - cron: '0 21 * * *'       # Fallback 1 — 07:00 AM Melbourne (AEST)
    - cron: '0 23 * * *'       # Fallback 2 — 09:00 AM Melbourne
  workflow_dispatch:
    inputs:
      test_row_limit:
        description: 'Max posts this run (manual only; scheduled runs always 1)'
        required: false
        default: ''
      force_sheet_row:
        description: 'Manual recovery — sheet row number (ignored on scheduled runs)'
        required: false
        default: ''

concurrency:
  group: daily-blog-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore auth from cache (fallback only)
        uses: actions/cache/restore@v4
        with:
          path: auth.json
          key: squarespace-auth-session
          restore-keys: squarespace-auth-session

      - name: Restore auth.json from secret (overrides cache)
        env:
          AUTH_JSON_BASE64: ${{ secrets.AUTH_JSON_BASE64 }}
        run: python3 restore_auth.py
        continue-on-error: true

      - name: Verify auth.json exists
        run: |
          if [ ! -f auth.json ]; then
            echo "::error::auth.json missing. Set AUTH_JSON_BASE64 or restore cache from a prior successful run."
            exit 1
          fi
          ls -la auth.json

      - name: Check session expiry
        run: |
          python3 - <<'EOF'
          import json, sys
          from datetime import datetime, timezone
          with open("auth.json") as f:
              state = json.load(f)
          cookies = state.get("cookies", [])
          now = datetime.now(timezone.utc).timestamp()
          expiring = [c for c in cookies if isinstance(c.get("expires"), (int, float)) and 0 < c["expires"] < now + 14 * 86400]
          expired  = [c for c in cookies if isinstance(c.get("expires"), (int, float)) and 0 < c["expires"] < now]
          if expired:
              print("::error::Squarespace session has EXPIRED cookies. Run generate_session.py locally and update AUTH_JSON_BASE64 secret.")
              sys.exit(1)
          elif expiring:
              print("::warning::Squarespace session cookies expire within 14 days. Regenerate auth.json soon to avoid automation failure.")
          else:
              print("Session cookies are valid.")
          EOF
        continue-on-error: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run automation
        env:
          SQ_EMAIL:             ${{ secrets.SQ_EMAIL }}
          SQ_PASSWORD:          ${{ secrets.SQ_PASSWORD }}
          GOOGLE_CREDENTIALS:   ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID:       ${{ secrets.SPREADSHEET_ID }}
          POLLINATIONS_API_KEY:   ${{ secrets.POLLINATIONS_AI }}
          HEADLESS:             "true"
          GITHUB_ACTIONS:       "true"
          DRY_RUN:              ""
          # repository_dispatch (cron-job.org) and schedule both count as scheduled runs:
          # today’s Pending row only, one post, no force row override.
          SCHEDULED_RUN:          ${{ (github.event_name == ‘schedule’ || github.event_name == ‘repository_dispatch’) && ‘1’ || ‘’ }}
          TEST_ROW_LIMIT:         ${{ (github.event_name == ‘schedule’ || github.event_name == ‘repository_dispatch’) && ‘1’ || github.event.inputs.test_row_limit }}
          FORCE_SHEET_ROW:        ${{ (github.event_name == ‘schedule’ || github.event_name == ‘repository_dispatch’) && ‘’ || github.event.inputs.force_sheet_row }}
        run: python automation.py

      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: "*.png"
          if-no-files-found: ignore
          retention-days: 7

      - name: Auto-refresh session secret
        # After a successful post the browser session has refreshed Squarespace
        # cookies. Slim auth.json and push the updated payload back to the
        # AUTH_JSON_BASE64 secret so the session never expires.
        # Requires GH_PAT secret: a Fine-grained PAT with Secrets read+write
        # for this repo (Settings → Developer settings → Personal access tokens).
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::GH_PAT secret not set — session will expire in ~30 days."
            echo "Create a Fine-grained PAT with Secrets read+write and add it as GH_PAT."
          else
            python3 shrink_auth.py
            gh secret set AUTH_JSON_BASE64 --body "$(cat auth_github.txt)" --repo "$GITHUB_REPOSITORY"
            echo "AUTH_JSON_BASE64 secret refreshed with latest session cookies ✅"
          fi
        continue-on-error: true

      - name: Save session to cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: auth.json
          key: squarespace-auth-session
