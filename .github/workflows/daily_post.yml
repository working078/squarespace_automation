name: Daily Blog Poster

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # Restore auth.json — tries GitHub Secret first (manually set),
      # then falls back to Actions Cache (auto-saved from previous runs).
      # auth.json is generated LOCALLY via generate_session.py — never from CI.
      # -----------------------------------------------------------------------
      - name: Restore Squarespace session (from Secret)
        run: |
          if [ -n "$AUTH_JSON_BASE64" ]; then
            echo "$AUTH_JSON_BASE64" | base64 --decode > auth.json
            echo "Session restored from AUTH_JSON_BASE64 secret."
          else
            echo "No AUTH_JSON_BASE64 secret found — will try cache next."
          fi
        env:
          AUTH_JSON_BASE64: ${{ secrets.AUTH_JSON_BASE64 }}

      - name: Restore Squarespace session (from Cache fallback)
        if: ${{ !env.AUTH_JSON_BASE64 }}
        uses: actions/cache@v4
        with:
          path: auth.json
          key: squarespace-auth-session
          restore-keys: squarespace-auth-session
        env:
          AUTH_JSON_BASE64: ${{ secrets.AUTH_JSON_BASE64 }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run automation
        env:
          SQ_EMAIL:           ${{ secrets.SQ_EMAIL }}
          SQ_PASSWORD:        ${{ secrets.SQ_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GITHUB_ACTIONS:     "true"
        run: python automation.py

      # Save updated auth.json to cache so it persists for next run
      - name: Save session to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: auth.json
          key: squarespace-auth-session

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_number }}
          path: |
            00_login_page.png
            00_login_success.png
            01_initial_landing.png
            02_editor_loaded.png
            04_after_publish_click.png
            fatal_error.png
            error_row_*.png
            add_post_btn_missing.png
            blog_image.jpg
          retention-days: 7
          if-no-files-found: ignore