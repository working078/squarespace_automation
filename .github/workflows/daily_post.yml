name: Daily Blog Poster

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore auth.json
        run: |
          if [ -n "$AUTH_JSON_BASE64" ]; then
            python3 -c "
import base64, gzip, os
raw = base64.b64decode(os.environ['AUTH_JSON_BASE64'].strip())
if raw[:2] == b'\x1f\x8b':
    raw = gzip.decompress(raw)
open('auth.json', 'wb').write(raw)
print(f'Session restored from AUTH_JSON_BASE64 ({len(raw)} bytes).')
"
          else
            echo "No AUTH_JSON_BASE64 secret — trying cache."
          fi
        env:
          AUTH_JSON_BASE64: ${{ secrets.AUTH_JSON_BASE64 }}

      - name: Restore auth from cache
        if: ${{ secrets.AUTH_JSON_BASE64 == '' }}
        uses: actions/cache@v4
        with:
          path: auth.json
          key: squarespace-auth-session
          restore-keys: squarespace-auth-session

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run automation
        env:
          SQ_EMAIL:           ${{ secrets.SQ_EMAIL }}
          SQ_PASSWORD:        ${{ secrets.SQ_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GITHUB_ACTIONS:     "true"
        run: python automation.py

      - name: Save session to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: auth.json
          key: squarespace-auth-session
