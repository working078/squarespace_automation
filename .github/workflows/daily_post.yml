name: Daily Blog Poster

on:
  schedule:
    # 21:00 UTC = 07:00 AEST (UTC+10) — runs daily at exactly 7 AM Melbourne time
    - cron: '0 21 * * *'
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python environment
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # 3. Install Python dependencies + Playwright browser
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # -----------------------------------------------------------------------
      # 4. Restore saved session (auth.json) from GitHub Secret
      #    FIX #2: This decodes the Base64 secret written back by step 6 below.
      # -----------------------------------------------------------------------
      - name: Restore Squarespace session
        run: |
          if [ -n "${{ secrets.AUTH_JSON_BASE64 }}" ]; then
            echo "${{ secrets.AUTH_JSON_BASE64 }}" | base64 --decode > auth.json
            echo "✅ Session restored from AUTH_JSON_BASE64 secret."
          else
            echo "⚠️  No AUTH_JSON_BASE64 secret found — script will perform fresh login."
          fi

      # -----------------------------------------------------------------------
      # 5. Run the automation script
      # -----------------------------------------------------------------------
      - name: Run automation
        env:
          SQ_EMAIL:           ${{ secrets.SQ_EMAIL }}
          SQ_PASSWORD:        ${{ secrets.SQ_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GITHUB_ACTIONS:     "true"
        run: |
          SCRIPT_PATH=$(find . -name "automation.py" | head -n 1)
          echo "Running: $SCRIPT_PATH"
          python "$SCRIPT_PATH"

      # -----------------------------------------------------------------------
      # 6. FIX #2: Save updated auth.json back to GitHub Secrets so tomorrow's
      #    run reuses today's valid session — no daily re-login required.
      #    Requires a GH_PAT secret with 'secrets:write' scope on this repo.
      # -----------------------------------------------------------------------
      - name: Save updated Squarespace session to GitHub Secrets
        if: always()   # run even if the script step failed (session may still be fresh)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f auth.json ]; then
            ENCODED=$(base64 -w 0 auth.json)
            gh secret set AUTH_JSON_BASE64 \
              --body "$ENCODED" \
              --repo "${{ github.repository }}"
            echo "✅ auth.json re-encoded and saved back to AUTH_JSON_BASE64 secret."
          else
            echo "⚠️  auth.json not found — secret not updated."
          fi

      # -----------------------------------------------------------------------
      # 7. Upload all debug screenshots as workflow artifacts (always runs)
      # -----------------------------------------------------------------------
      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_number }}
          path: |
            01_initial_landing.png
            02_editor_loaded.png
            04_after_publish_click.png
            featured_image_error.png
            fatal_error.png
            error_row_*.png
            blog_image.jpg
          retention-days: 7
          if-no-files-found: ignore   # don't fail the job if no screenshots exist