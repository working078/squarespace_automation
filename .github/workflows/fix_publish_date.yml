name: Fix Post Publish Date

on:
  workflow_dispatch:
    inputs:
      post_title:
        description: 'Post title (substring match)'
        required: true
        default: 'How IBC Transport Between Melbourne and Mansfield Usually Works'
      publish_date:
        description: 'Sheet date e.g. 23/05/26'
        required: true
        default: '23/05/26'

jobs:
  fix-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore auth.json
        env:
          AUTH_JSON_BASE64: ${{ secrets.AUTH_JSON_BASE64 }}
        run: python3 restore_auth.py
        continue-on-error: true

      - uses: actions/cache/restore@v4
        with:
          path: auth.json
          key: squarespace-auth-session

      - name: Install and run
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps
          python set_post_publish_date.py \
            --title "${{ inputs.post_title }}" \
            --date "${{ inputs.publish_date }}"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fix-publish-date-screenshots
          path: fix_date_*.png
          if-no-files-found: ignore
